[workspace]
channels = ["conda-forge", "avcopan"]
platforms = ["linux-64"]
preview = ["pixi-build"]

[dependencies]
python = ">=3.12,<3.14"
autostorage = { path = "." }
automol = "==0.0.19"  # local:false
# automol = { path = "../automol" }  # local:true

[pypi-dependencies]
xyzrender = ">=0.3.1, <0.4"

[package]
name = "autostorage"
version = "0.0.10"

[package.build]
backend = { name = "pixi-build-python", version = "*" }

[package.build.config]
ignore-pyproject-manifest = false
ignore-pypi-mapping = false

[package.host-dependencies]
uv = "*"

[feature.dev.dependencies]
uv = "*"
ruff = "*"
ty = ">=0.0.59,<0.0.60"
import-linter = "*"
pytest = "*"
pytest-cov = "*"
lefthook = "*"
rattler-build = "*"
tbump = "*"
ipykernel = "*"
h5py = ">=3.16.0,<4"
alembic = ">=1.18.5,<2"

[feature.dev.pypi-dependencies]
keepachangelog = "*"
xyzrender = ">=0.3.1, <0.4"
stereomolgraph = ">=0.0.22b0"
irmsd = ">=0.1.1"

[feature.docs.dependencies]
sphinx = "*"
myst-parser = "*"
pydata-sphinx-theme = "*"
sphinx-autodoc2 = "*"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev", "docs"], solve-group = "default"}

[feature.dev.tasks]
# Manage pyproject.toml with uv
uv = "uv"
add = "uv add"
remove = "uv remove"
# Local dependency management (see scripts/local.sh)
local = "./scripts/local.sh"
# Individual tasks for pre-commit hooks (must be added to lefthook.yaml)
fmt = "ruff format ."
lint = "ruff check . --fix"
types = "ty check"
imports = "lint-imports"
test = "pytest"
# Apply database migrations (set AUTOSTORAGE_DATABASE_URL to target a specific DB)
migrate = "alembic upgrade head"
# Run pre-commit hooks (see lefthook.yaml)
pre-commit = "lefthook run pre-commit --all-files"
local-pre-commit = "lefthook run local-pre-commit --all-files"
# View coverage report
cov-view = "\"$BROWSER\" htmlcov/index.html"
# Build and view documentation
docs-build = "sphinx-build docs/source docs/build"
docs-view = { cmd = "scripts/view-docs.sh", depends-on = ["docs-build"] }
# Build and publish conda package
build-conda = "pixi build -o dist"
publish-conda = "rattler-build upload anaconda dist/*.conda -o avcopan"
# Build and publish PyPI package
build-pypi = "uv build"
publish-pypi = "uv publish"
publish-test-pypi = "uv publish --publish-url https://test.pypi.org/legacy/"
# Initiate release
version = "tbump current-version"
changelog = { cmd = "keepachangelog release {{ version }}", args=["version"] }
release = "tbump"
# Toggle Git hooks on/off
hooks = "./scripts/hooks.sh"
# Setup and initialize this repository (only run once)
setup = "./scripts/setup.sh"
init = { cmd = "./scripts/init.sh", depends-on = ["setup"]}
cookiecutter-update = "./scripts/cookiecutter-update.sh"
